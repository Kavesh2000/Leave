<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>HR — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
  </head>
  <body style="background:#0f1419;color:#e6eef8;">
    <div id="sessionDebug" style="background:#22223b;color:#fbbf24;padding:8px 16px;border-radius:8px;margin:12px 0 0 0;font-size:13px;display:none"></div>
    <nav class="navbar navbar-expand-sm" style="background:linear-gradient(90deg,#0f172a 0%,#1a2a4a 100%);border-bottom:2px solid #10b981;box-shadow:0 4px 20px rgba(16,185,129,0.15);">
      <div class="container-fluid">
        <a class="navbar-brand" href="#" id="navbarBrand" style="color:white;font-weight:700;">Welcome back, <span id="navbarLastName">HR</span></a>
        <div class="d-flex gap-3 align-items-center">
          <div style="color:#a0c9a8;font-size:13px;text-align:right;">
            <div id="userName" style="font-weight:600;color:#10b981;">-</div>
            <div id="loggedInAs" style="font-size:12px;color:#a0c9a8;"></div>
          </div>
          <button id="logout" class="btn" style="background:#ef4444;color:#fff;border:0;border-radius:6px;padding:6px 12px;font-weight:500;">Logout</button>
        </div>
      </div>
    </nav>
    <main class="container-fluid py-4">
      <div class="row">
        <aside class="col-md-3 mb-3" style="min-height: 100vh;">
          <div class="card shadow-lg h-100" style="min-height:100vh;display:flex;flex-direction:column;justify-content:flex-start;border-radius:16px;border:1px solid #1e3a8a;background:linear-gradient(135deg,#1e40af,#1e3a8a);">
            <div class="card-body p-3">
              <div class="d-flex align-items-center mb-4 pb-3 border-bottom" style="border-color:#3b82f6!important">
                <div style="width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#10b981,#0d7a66);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;margin-right:12px;font-size:24px;">🧑‍💼</div>
                <div>
                  <div class="fw-bold text-light" style="font-size:16px;">HR Panel</div>
                  <div class="text-muted small" style="color:#bfdbfe;">Human Resources</div>
                </div>
              </div>
              <div class="list-group" style="border:none;gap:8px;display:flex;flex-direction:column;">
                <button type="button" class="list-group-item list-group-item-action active" data-view="records" style="border-radius:10px;border:1px solid #10b981;background:linear-gradient(135deg,#10b981,#0d7a66);color:white;font-weight:500;cursor:pointer;">📋 Employee Records</button>
                <button type="button" class="list-group-item list-group-item-action" data-view="requests" style="border-radius:10px;border:1px solid #10b981;background:linear-gradient(135deg,#1e40af,#1e3a8a);color:#e0e7ff;transition:all 0.3s;cursor:pointer;">📝 Leave Requests</button>
                <button type="button" class="list-group-item list-group-item-action" data-view="leaveHistory" style="border-radius:10px;border:1px solid #8b5cf6;background:linear-gradient(135deg,#8b5cf6,#a21caf);color:#fff;transition:all 0.3s;cursor:pointer;">📖 Leave History</button>
                <!-- Add more menu items here if needed -->
              </div>
            </div>
          </div>
        </aside>
        <section class="col-md-9">
        <section class="col-md-9">
          <div class="mb-4 d-flex align-items-center" style="gap:1rem;border-bottom:2px solid #2a4a5a;padding-bottom:1rem;">
            <h4 style="color:#10b981;font-weight:700;">HR Dashboard</h4>
          </div>
          <div id="view-records" class="view">
            <div class="card shadow-sm mb-4" style="background:linear-gradient(135deg,#1a2a3a,#0f1a25);border:1px solid #2a4a5a;">
              <div class="card-body">
                <h5 class="card-title" style="color:#8b5cf6;font-weight:700;">Employee Records & Leave Balances</h5>
                <div class="mb-3">
                  <label for="deptFilter" style="color:#a0c9a8;font-weight:500;">Select Department:</label>
                  <select id="deptFilter" class="form-select" style="width:220px;display:inline-block;background:#0f1a25;color:#e6eef8;border-radius:6px;">
                    <option value="">All Departments</option>
                  </select>
                </div>
                <div class="table-responsive">
                  <table class="table table-striped table-dark">
                    <thead>
                      <tr>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Annual</th>
                        <th>Accrued</th>
                        <th>Sick</th>
                        <th>Maternity</th>
                        <th>Paternity</th>
                      </tr>
                    </thead>
                    <tbody id="employeeRecords"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
          <div id="view-requests" class="view d-none">
            <div class="card shadow-sm mb-4" style="background:linear-gradient(135deg,#1a2a3a,#0f1a25);border:1px solid #2a4a5a;">
              <div class="card-body">
                <h5 class="card-title" style="color:#f97316;font-weight:700;">All Leave Requests</h5>
                <div class="table-responsive">
                  <table class="table table-striped table-dark">
                    <thead>
                      <tr>
                        <th>Employee</th>
                        <th>Type</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Days</th>
                        <th>Status</th>
                        <th>Actions</th>
                      </tr>
                    </thead>
                    <tbody id="leaveRequests"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
          <div id="view-leaveHistory" class="view d-none">
            <div class="card shadow-sm mb-4" style="background:linear-gradient(135deg,#1a2a3a,#0f1a25);border:1px solid #2a4a5a;">
              <div class="card-body">
                <h5 class="card-title" style="color:#8b5cf6;font-weight:700;">Leave History</h5>
                <div class="table-responsive">
                  <table class="table table-striped table-dark">
                    <thead>
                      <tr>
                        <th>Employee</th>
                        <th>Type</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Days</th>
                        <th>Status</th>
                        <th>Approver</th>
                        <th>Comment</th>
                      </tr>
                    </thead>
                    <tbody id="hrLeaveHistory"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
              <script>

            // --- Leave History logic for HR ---
            async function refreshHrLeaveHistory() {
              const tb = document.getElementById('hrLeaveHistory');
              if (!tb) return;
              tb.innerHTML = '';
              const reqs = await (await fetch('/api/leave_requests')).json();
              if (!Array.isArray(reqs) || reqs.length === 0) {
                tb.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#888;">📭 No leave requests found</td></tr>`;
                return;
              }
              reqs.forEach(x => {
                let approver = '';
                let comment = '';
                if (x.status === 'hr_approved') { approver = 'HR'; comment = x.hod_comment || ''; }
                else if (x.status === 'rejected') { approver = 'HR'; comment = x.hod_comment || ''; }
                else if (x.status === 'pending') { approver = '-'; comment = ''; }
                const statusBadge = x.status === 'hr_approved' ? `<span style='background:#0ea5e9;color:#fff;padding:4px 10px;border-radius:6px;font-weight:600;'>HR Approved</span>` :
                  x.status === 'rejected' ? `<span style='background:#a78bfa;color:#fff;padding:4px 10px;border-radius:6px;font-weight:600;'>Rejected</span>` :
                  `<span style='background:#f97316;color:#fff;padding:4px 10px;border-radius:6px;font-weight:600;'>Pending</span>`;
                tb.innerHTML += `<tr>
                  <td style='padding:12px;'>${x.full_name || x.employee_name || '-'}</td>
                  <td style='padding:12px;'>${x.leave_type || '-'}</td>
                  <td style='padding:12px;'>${x.start_date || '-'}</td>
                  <td style='padding:12px;'>${x.end_date || '-'}</td>
                  <td style='padding:12px;text-align:center;'>${x.days || '-'}</td>
                  <td style='padding:12px;text-align:center;'>${statusBadge}</td>
                  <td style='padding:12px;'>${approver}</td>
                  <td style='padding:12px;'>${comment ? comment : '-'}</td>
                </tr>`;
              });
            }

            // Show/hide views and attach leave history refresh for HR
            document.querySelectorAll('.list-group-item[data-view]').forEach(btn => {
              btn.addEventListener('click', function() {
                document.querySelectorAll('.view').forEach(v => v.classList.add('d-none'));
                const viewId = 'view-' + btn.getAttribute('data-view');
                const view = document.getElementById(viewId);
                if (view) {
                  view.classList.remove('d-none');
                  if (viewId === 'view-leaveHistory') refreshHrLeaveHistory();
                }
                document.querySelectorAll('.list-group-item[data-view]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
              });
            });
                            async function showSessionDebug() {
                              try {
                                const res = await fetch('/api/profile');
                                if (res.ok) {
                                  const user = await res.json();
                                  const debug = document.getElementById('sessionDebug');
                                  debug.innerHTML = `<b>Session Debug:</b> Email: ${user.email} | Role: ${user.role} | Department: ${user.department}`;
                                  debug.style.display = 'block';
                                }
                              } catch (e) {}
                            }
              // Tab switching logic for HR dashboard
              const btnRecords = document.querySelector('[data-view="records"]');
              const btnRequests = document.querySelector('[data-view="requests"]');
              btnRecords.onclick = function() {
                document.getElementById('view-records').classList.remove('d-none');
                document.getElementById('view-requests').classList.add('d-none');
                btnRecords.classList.add('active');
                btnRequests.classList.remove('active');
              };
              btnRequests.onclick = function() {
                document.getElementById('view-requests').classList.remove('d-none');
                document.getElementById('view-records').classList.add('d-none');
                btnRequests.classList.add('active');
                btnRecords.classList.remove('active');
              };
              // On page load, show only employee records by default
              document.getElementById('view-records').classList.remove('d-none');
              document.getElementById('view-requests').classList.add('d-none');

              // Department dropdown and user sync logic
              async function loadDepartmentsAndUsers() {
                // Fetch departments (same as admin)
                try {
                  const deptRes = await fetch('/api/departments');
                  const depts = deptRes.ok ? await deptRes.json() : [];
                  const deptSel = document.getElementById('deptFilter');
                  deptSel.innerHTML = '<option value="">All Departments</option>';
                  depts.forEach(d => {
                    deptSel.innerHTML += `<option value="${d.name}">${d.name}</option>`;
                  });
                } catch (e) {}

                // Fetch users (HR endpoint)
                try {
                  const userRes = await fetch('/api/hr/users');
                  const users = userRes.ok ? await userRes.json() : [];
                  window.hrUsers = users; // Store globally for filtering
                  renderEmployeeRecords();
                } catch (e) {
                  window.hrUsers = [];
                  renderEmployeeRecords();
                }

                // Fetch leave requests for HR
                try {
                  const leaveRes = await fetch('/api/leave_requests');
                  const leaveRequests = leaveRes.ok ? await leaveRes.json() : [];
                  window.hrLeaveRequests = leaveRequests;
                  renderLeaveRequests();
                } catch (e) {
                  window.hrLeaveRequests = [];
                  renderLeaveRequests();
                }
              }

              function renderEmployeeRecords() {
                const dept = document.getElementById('deptFilter').value;
                let users = window.hrUsers || [];
                // Filter users by department if needed
                if (dept) {
                  users = users.filter(u => (u.department || '').trim().toLowerCase() === dept.trim().toLowerCase());
                }
                const empTb = document.getElementById('employeeRecords');
                empTb.innerHTML = '';
                users.forEach((u, idx) => {
                  const annual = u.annual || 0;
                  const sick = u.sick || 0;
                  const maternity = u.maternity || 0;
                  const paternity = u.paternity || 0;
                  const accrued = u.accrued_days || 0;
                  const bgColor = idx % 2 === 0 ? '#f8f9fa' : '#ffffff';
                  empTb.innerHTML += `<tr style='background:${bgColor};border-radius:12px;'>
                    <td style='border-radius:8px 0 0 8px;padding:12px;'><strong style='display:block;'>${u.full_name}</strong><div class='text-muted' style='font-size:12px;'>${u.email}</div></td>
                    <td style='padding:12px;'>${u.department || '—'}</td>
                    <td style='padding:12px;'><span style='background:linear-gradient(135deg, #10b981 0%, #0d7a66 100%);color:white;padding:4px 12px;border-radius:20px;font-weight:600;'>${annual}</span></td>
                    <td style='padding:12px;'><span style='background:linear-gradient(135deg, #818cf8 0%, #a5b4fc 100%);color:#312e81;padding:4px 12px;border-radius:20px;font-weight:600;'>${accrued}</span></td>
                    <td style='padding:12px;'><span style='background:linear-gradient(135deg, #34d399 0%, #10b981 100%);color:white;padding:4px 12px;border-radius:20px;font-weight:600;'>${sick}</span></td>
                    <td style='padding:12px;'><span style='background:linear-gradient(135deg, #fbbf24 0%, #fde68a 100%);color:#78350f;padding:4px 12px;border-radius:20px;font-weight:600;'>${maternity}</span></td>
                    <td style='padding:12px;'><span style='background:linear-gradient(135deg, #f472b6 0%, #f9a8d4 100%);color:#831843;padding:4px 12px;border-radius:20px;font-weight:600;'>${paternity}</span></td>
                  </tr>`;
                });
              }

              function renderLeaveRequests() {
                const tbody = document.getElementById('leaveRequests');
                const requests = window.hrLeaveRequests || [];
                tbody.innerHTML = '';
                if (!Array.isArray(requests) || requests.length === 0) {
                  tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#aaa;">No leave requests found for HR.</td></tr>`;
                  return;
                }
                requests.forEach(req => {
                  let actions = '';
                  if (req.status === 'pending') {
                    actions = `
                      <button class="btn btn-success btn-sm me-1" data-action="approve" data-id="${req.id}">Approve</button>
                      <button class="btn btn-danger btn-sm" data-action="reject" data-id="${req.id}">Reject</button>
                    `;
                  }
                  tbody.innerHTML += `<tr>
                    <td>${req.full_name}</td>
                    <td>${req.leave_type}</td>
                    <td>${req.start_date ? req.start_date.slice(0,10) : ''}</td>
                    <td>${req.end_date ? req.end_date.slice(0,10) : ''}</td>
                    <td>${req.days ?? ''}</td>
                    <td>${req.status}</td>
                    <td>${actions}</td>
                  </tr>`;
                });
                // Attach event listeners for approve/reject
                tbody.querySelectorAll('button[data-action]').forEach(btn => {
                  btn.onclick = function() {
                    const action = this.getAttribute('data-action');
                    const id = this.getAttribute('data-id');
                    showHrActionModal(id, action);
                  };
                });
              }

              // Modal for HR action
              function showHrActionModal(requestId, action) {
                let modal = document.getElementById('hrActionModal');
                if (!modal) {
                  modal = document.createElement('div');
                  modal.id = 'hrActionModal';
                  modal.innerHTML = `
                    <div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.4);z-index:2000;display:flex;align-items:center;justify-content:center;">
                      <div style="background:#fff;padding:32px 28px;border-radius:12px;min-width:320px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
                        <h5 style="margin-bottom:18px;">${action === 'approve' ? 'Approve' : 'Reject'} Leave Request</h5>
                        <div class="mb-3">
                          <label for="hrActionComment" class="form-label">Comment/Reason (optional):</label>
                          <textarea id="hrActionComment" class="form-control" rows="3" style="width:100%;"></textarea>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                          <button id="hrActionCancel" class="btn btn-secondary">Cancel</button>
                          <button id="hrActionSubmit" class="btn btn-primary">Submit</button>
                        </div>
                      </div>
                    </div>
                  `;
                  document.body.appendChild(modal);
                } else {
                  modal.style.display = 'flex';
                }
                modal.querySelector('#hrActionComment').value = '';
                // Cancel button
                modal.querySelector('#hrActionCancel').onclick = function() {
                  modal.style.display = 'none';
                };
                // Submit button
                modal.querySelector('#hrActionSubmit').onclick = async function() {
                  const comment = modal.querySelector('#hrActionComment').value;
                  modal.querySelector('#hrActionSubmit').disabled = true;
                  try {
                    const res = await fetch(`/api/leave_requests/${requestId}/hr_action`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ action, comment })
                    });
                    if (res.ok) {
                      modal.style.display = 'none';
                      await loadDepartmentsAndUsers(); // Refresh data
                      showToast(`Request ${action === 'approve' ? 'approved' : 'rejected'} successfully.`);
                    } else {
                      const err = await res.json();
                      alert('Error: ' + (err.error || 'Failed to update request'));
                    }
                  } catch (e) {
                    alert('Network error: ' + e.message);
                  } finally {
                    modal.querySelector('#hrActionSubmit').disabled = false;
                  }
                };
                modal.style.display = 'flex';
              }

              // Toast utility for feedback
              function showToast(msg) {
                let wrap = document.querySelector('.toast-wrap');
                if (!wrap) {
                  wrap = document.createElement('div');
                  wrap.className = 'toast-wrap';
                  wrap.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10000;';
                  document.body.appendChild(wrap);
                }
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                t.style.cssText = 'background:linear-gradient(135deg,#10b981,#0d7a66);color:#fff;padding:12px 16px;border-radius:8px;box-shadow:0 8px 24px rgba(16,185,129,0.3);border-left:4px solid #14b8a6;font-weight:600;font-size:14px;margin-top:8px;';
                wrap.appendChild(t);
                setTimeout(() => t.remove(), 3500);
              }

              document.getElementById('deptFilter').onchange = renderEmployeeRecords;
              // On page load, call the new async renderEmployeeRecords
              document.addEventListener('DOMContentLoaded', () => {
                setUserProfile();
                loadDepartmentsAndUsers();
                renderEmployeeRecords();
                showSessionDebug();
              });
              async function setUserProfile() {
                try {
                  const res = await fetch('/api/profile');
                  if (res.ok) {
                    const user = await res.json();
                    const lastName = user.full_name.split(' ').slice(-1)[0];
                    document.getElementById('navbarLastName').textContent = lastName;
                    document.getElementById('userName').textContent = user.full_name;
                    document.getElementById('loggedInAs').textContent = `Logged in as ${user.full_name}`;
                  }
                } catch (e) {}
              }
              document.addEventListener('DOMContentLoaded', () => {
                setUserProfile();
                loadDepartmentsAndUsers();
              });
              // Logout button handler
              document.getElementById('logout').onclick = async function() {
                try {
                  await fetch('/api/logout', { method: 'POST', credentials: 'same-origin' });
                } catch (e) {}
                window.location.href = '/index.html';
              };
              </script>
          </section>
        </div>
      </main>
    <!-- All JavaScript is now inside <script> tags at the end of the body. No raw JS should be rendered. -->
  </body>
</html>
