<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Employee — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
  </head>
  <body style="background:#0f1419;color:#e6eef8;">
    <nav class="navbar navbar-expand-sm" style="background:linear-gradient(90deg,#0f172a 0%,#1a2a4a 100%);border-bottom:2px solid #10b981;box-shadow:0 4px 20px rgba(16,185,129,0.15);">
      <div class="container-fluid">
        <a class="navbar-brand" href="#" id="navbarBrand" style="color:white;font-weight:700;">Welcome back,</a>
        <div class="d-flex gap-3 align-items-center">
          <div style="color:#a0c9a8;font-size:13px;text-align:right;">
            <div id="userName" style="font-weight:600;color:#10b981;">-</div>
            <div id="userDept" style="font-size:12px;color:#7dd9e8;">-</div>
          </div>
          <button id="logout" class="btn" style="background:#ef4444;color:#fff;border:0;border-radius:6px;padding:6px 12px;font-weight:500;">Logout</button>
        </div>
      </div>
    </nav>
    <main class="container-fluid py-4">
      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 class="m-0" style="color:#10b981;font-weight:700;">📊 Dashboard</h4>
          <div>
            <button id="openApply" class="btn hover-scale" style="background:linear-gradient(135deg,#10b981,#0d7a66);color:#fff;border:0;border-radius:8px;padding:8px 16px;font-weight:600;">📝 Apply Leave</button>
          </div>
        </div>
        <div class="row gap-6" style="justify-content: flex-start;">
          <div class="col-sm-6 col-lg-3">
            <div class="card p-3 hover-scale" style="background:linear-gradient(135deg,#1a4c2e,#0f2d1f);border:1px solid #2a6a45;box-shadow:0 8px 24px rgba(16,185,129,0.12);">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="h2" id="card-annual" style="color:#10b981;font-weight:700;">-</div>
                  <div style="color:#a0c9a8;font-size:0.9rem;font-weight:500;">Annual Leave Remaining</div>
                </div>
                <div><span class="badge" style="background:#10b981;color:#0f1419;font-size:1.2rem;">🌴</span></div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-lg-3">
            <div class="card p-3 hover-scale" style="background:linear-gradient(135deg,#1a3a4a,#0f242f);border:1px solid #2a5a6a;box-shadow:0 8px 24px rgba(0,212,255,0.1);">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="h2" id="card-sick" style="color:#00d4ff;font-weight:700;">-</div>
                  <div style="color:#7dd9e8;font-size:0.9rem;font-weight:500;">Sick Leave Remaining</div>
                </div>
                <div><span class="badge" style="background:#00d4ff;color:#0f1419;font-size:1.2rem;">🤒</span></div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-lg-3">
            <div class="card p-3 hover-scale" style="background:linear-gradient(135deg,#4a3a1a,#3f2f0f);border:1px solid #6a5a2a;box-shadow:0 8px 24px rgba(249,115,22,0.12);">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="h2" id="card-pending" style="color:#f97316;font-weight:700;">-</div>
                  <div style="color:#e8b398;font-size:0.9rem;font-weight:500;">Pending Requests</div>
                </div>
                <div><span class="badge" style="background:#f97316;color:#1f1f1f;font-size:1.2rem;">⏳</span></div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-lg-3">
            <div class="card p-3 hover-scale" style="background:linear-gradient(135deg,#2a3a4a,#1f2a35);border:1px solid #3a5a6a;box-shadow:0 8px 24px rgba(168,85,247,0.12);">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="h2" id="card-taken" style="color:#a78bfa;font-weight:700;">-</div>
                  <div style="color:#c9b8e4;font-size:0.9rem;font-weight:500;">Total Leave Taken</div>
                </div>
                <div><span class="badge" style="background:#a78bfa;color:#0f1419;font-size:1.2rem;">📊</span></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm mb-4" style="background:linear-gradient(135deg,#1a2a3a,#0f1a25);border:1px solid #2a4a5a;">
        <div class="card-body">
          <h5 class="card-title" style="background:linear-gradient(135deg,#8b5cf6 10%, #ec4899 40%, #f97316 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;margin-bottom:1.5rem;">📋 Leave History</h5>
          <div class="table-responsive">
            <table style="width:100%;border-collapse:separate;border-spacing:0 8px;">
              <thead>
                <tr style="background:linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);color:white;font-weight:600;">
                  <th style="border-radius:8px 0 0 0;padding:12px;text-align:left;">📅 Type</th>
                  <th style="padding:12px;text-align:left;">From</th>
                  <th style="padding:12px;text-align:left;">To</th>
                  <th style="padding:12px;text-align:center;">Days</th>
                  <th style="border-radius:0 8px 0 0;padding:12px;text-align:center;">Status</th>
                </tr>
              </thead>
              <tbody id="history"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <!-- Apply Modal -->
    <div id="applyModal" class="position-fixed top-0 start-0 w-100 h-100 d-none" style="z-index:1100;backdrop-filter:blur(3px);background:rgba(0,0,0,0.6);">
      <div class="d-flex vh-100 align-items-center justify-content-center">
        <div class="card p-4 shadow-lg modal-fade" style="width:540px;background:linear-gradient(135deg,#1a2a3f,#0f1a28);border:1px solid #2a4a5f;">
          <h5 style="color:#10b981;font-weight:700;margin-bottom:1.5rem;">📝 Apply Leave</h5>
          <form id="applyForm">
            <div class="row g-2">
              <div class="col-md-6"><label class="form-label" style="color:#a0c9a8;font-weight:500;">Leave Type</label><select id="m_lt" class="form-select" style="background:#0f1a25;border:1px solid #2a4a5a;color:#e6eef8;border-radius:6px;"></select></div>
              <div class="col-md-6"><label class="form-label" style="color:#a0c9a8;font-weight:500;">Days (auto)</label><input id="m_days" class="form-control" readonly style="background:#0a0f15;border:1px solid #2a4a5a;color:#10b981;font-weight:700;"></div>
            </div>
            <div class="row g-2 mt-2">
              <div class="col-md-6"><label class="form-label" style="color:#a0c9a8;font-weight:500;">Start Date</label><input id="m_start" type="date" class="form-control" style="background:#0f1a25;border:1px solid #2a4a5a;color:#e6eef8;border-radius:6px;"></div>
              <div class="col-md-6"><label class="form-label" style="color:#a0c9a8;font-weight:500;">End Date</label><input id="m_end" type="date" class="form-control" style="background:#0f1a25;border:1px solid #2a4a5a;color:#e6eef8;border-radius:6px;"></div>
            </div>
            <div class="mb-3 mt-3"><label class="form-label" style="color:#a0c9a8;font-weight:500;">Reason</label><input id="m_reason" class="form-control" style="background:#0f1a25;border:1px solid #2a4a5a;color:#e6eef8;border-radius:6px;"></div>
            <div class="d-flex justify-content-end gap-2">
              <button type="button" id="m_cancel" class="btn" style="background:#2a3a4a;color:#e6eef8;border:1px solid #3a5a6a;border-radius:6px;padding:8px 16px;">Cancel</button>
              <button class="btn" style="background:linear-gradient(135deg,#10b981,#0d7a66);color:#fff;border:0;border-radius:6px;padding:8px 16px;font-weight:600;">Submit</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
    let HOLIDAYS = [];
    async function awaitFetchHolidays(){
      try{ const res = await fetch('/api/holidays'); if(res.ok) return await res.json(); }catch(e){}
      return [];
    }

    function badgeFor(status){
      if(status==='pending') return `<span class='badge' style='background:#f97316;color:#fff;'>⏳ Awaiting Approval</span>`;
      if(status==='hod_approved') return `<span class='badge' style='background:#6366f1;color:#fff;'>✓ HOD Approved</span>`;
      if(status==='admin_approved') return `<span class='badge' style='background:#10b981;color:#fff;font-weight:700;'>✅ APPROVED</span>`;
      return `<span class='badge' style='background:#ef4444;color:#fff;'>✗ Rejected</span>`;
    }

    async function load(){
      // Load user info
      try {
        const me = await (await fetch('/api/me')).json();
        if(me && me.full_name) {
          document.getElementById('userName').textContent = me.full_name;
          document.getElementById('userDept').textContent = me.department || 'No Department';
          
          // Extract surname (last word) from full name
          const nameParts = me.full_name.trim().split(/\s+/);
          const surname = nameParts.length > 1 ? nameParts[nameParts.length - 1] : me.full_name;
          document.getElementById('navbarBrand').textContent = 'Welcome back, ' + surname;
        }
      } catch(e) { console.error(e); }
      
      // Force navbar welcome text to white
      document.getElementById('navbarBrand').style.color = '#ffffff';
      
      HOLIDAYS = await awaitFetchHolidays();
      const lt = await (await fetch('/api/leave_types')).json();
      const sel = document.getElementById('m_lt');
      sel.innerHTML=''; lt.forEach(t=> { const o=document.createElement('option'); o.value=t.id; o.textContent=t.name; sel.appendChild(o); });
      // fill cards and history
      await refreshSummary();
      await refreshHistory();
    }

    async function refreshSummary(){
      const balances = await (await fetch('/api/balances')).json();
      let annual = 0, sick = 0;
      balances.forEach(b=>{ if(b.leave_type==='Annual') annual = b.remaining_days; if(b.leave_type==='Sick') sick = b.remaining_days; });
      document.getElementById('card-annual').textContent = annual;
      document.getElementById('card-sick').textContent = sick;
      const reqs = await (await fetch('/api/leave_requests')).json();
      document.getElementById('card-pending').textContent = reqs.filter(r=>r.status==='pending').length;
      // total taken (approved)
      const total = reqs.filter(r=>r.status==='admin_approved').reduce((s,r)=>s + (r.days||0),0);
      document.getElementById('card-taken').textContent = total;
    }

    async function refreshHistory(){
      const r = await (await fetch('/api/leave_requests')).json();
      const tb = document.getElementById('history'); 
      tb.innerHTML='';
      
      if(r.length === 0) {
        const emptyRow = document.createElement('tr');
        emptyRow.innerHTML = `<td colspan="5" style="text-align:center;padding:40px;color:#888;">📭 No leave requests yet</td>`;
        tb.appendChild(emptyRow);
        return;
      }
      
      r.forEach((x, idx)=>{
        const statusConfig = {
          'pending': { color: '#ef4444', bg: '#fef2f2', text: '⏳ Awaiting Approval', textColor: '#dc2626' },
          'hod_approved': { color: '#0ea5e9', bg: '#f0f9ff', text: '✓ HOD Approved', textColor: '#0284c7' },
          'admin_approved': { color: '#22c55e', bg: '#f0fdf4', text: '✅ APPROVED', textColor: '#16a34a' },
          'rejected': { color: '#a78bfa', bg: '#faf5ff', text: '✗ Rejected', textColor: '#8b5cf6' }
        };
        const status = statusConfig[x.status] || statusConfig['pending'];
        const bgColor = idx % 2 === 0 ? 'transparent' : 'rgba(139, 92, 246, 0.05)';
<<<<<<< HEAD

        tb.appendChild(tr);
      });
    }

    // Apply modal logic
    document.getElementById('openApply').onclick = ()=>{
      document.getElementById('applyModal').classList.remove('d-none');
      setTimeout(()=> document.querySelector('.modal-fade').classList.add('show'),10);
    };
    document.getElementById('m_cancel').onclick = ()=>{
      document.querySelector('.modal-fade').classList.remove('show');
      setTimeout(()=> document.getElementById('applyModal').classList.add('d-none'),220);
    };

    async function calcDays(start,end){
      if(!start || !end) return 0;
      const res = await fetch(`/api/calc_days?start_date=${encodeURIComponent(start)}&end_date=${encodeURIComponent(end)}`);
      if(res.ok){ const j = await res.json(); return j.days; }
      return 0;
    }

    // initialize flatpickr
    flatpickr('#m_start', {dateFormat:'Y-m-d', onChange: async function(selectedDates, dateStr){ const d = await calcDays(dateStr, document.getElementById('m_end').value); document.getElementById('m_days').value = d; }});
    flatpickr('#m_end', {dateFormat:'Y-m-d', onChange: async function(selectedDates, dateStr){ const d = await calcDays(document.getElementById('m_start').value, dateStr); document.getElementById('m_days').value = d; }});

    document.getElementById('applyForm').onsubmit = async e =>{
      e.preventDefault();
      const leave_type_id = parseInt(document.getElementById('m_lt').value);
      const start_date = document.getElementById('m_start').value;
      const end_date = document.getElementById('m_end').value;
      const reason = document.getElementById('m_reason').value;
      const res = await fetch('/api/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({leave_type_id,start_date,end_date,reason})});
      if(res.ok){ showToast('Leave applied'); document.getElementById('m_cancel').click(); await refreshSummary(); await refreshHistory(); } else { const j=await res.json(); showToast('Error: '+(j.error||'')); }
    };

    function showToast(msg){ const wrap = document.querySelector('.toast-wrap') || (function(){ const d=document.createElement('div'); d.className='toast-wrap'; document.body.appendChild(d); return d; })(); const t=document.createElement('div'); t.className='toast'; t.textContent=msg; wrap.appendChild(t); setTimeout(()=> t.remove(),3500); }

    // Theme toggle
    function applyTheme(){ if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark'); else document.body.classList.remove('dark'); }
    const themeBtn = document.getElementById('themeToggle'); if(themeBtn) themeBtn.onclick = ()=>{ const isDark = document.body.classList.toggle('dark'); localStorage.setItem('theme', isDark? 'dark':'light'); };
    applyTheme();

    document.getElementById('logout').onclick = async (e)=>{
      e.preventDefault();
      if(!confirm('Are you sure you want to logout?')) return;
      const btn = document.getElementById('logout');
      btn.textContent = 'Logging out...';
      btn.disabled = true;
      try {
        await fetch('/api/logout', {method:'POST'});
        setTimeout(() => { location.href='/'; }, 300);
      } catch(err) {
        alert('Logout error: ' + err.message);
        btn.textContent = 'Logout';
        btn.disabled = false;
      }
    };
    load();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
